<!DOCTYPE html>
<html>
<head>
  <title>Wallet Checker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #334155;
      color: white;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Wallet Info</h2>

  <!-- INPUT manual -->
  <input id="sender" placeholder="Enter Wallet Address">

  <button onclick="getBalance()">Check Balance</button>

  <p><strong>BNB Balance:</strong> <span id="balance">0</span></p>

  <hr>

  <h3>Send Token (requires wallet)</h3>

  <button onclick="connectWallet()">Connect Wallet</button>

  <input id="tokenAddress" placeholder="Token Contract Address">
  <input id="to" placeholder="Recipient Address">
  <input id="amount" placeholder="Amount">

  <button onclick="sendToken()">Send Token</button>
</div>

<script>
let provider;
let signer;

const ERC20_ABI = [
  "function transfer(address to, uint amount) returns (bool)",
  "function decimals() view returns (uint8)"
];

// ✅ Merr balance nga adresë manuale
async function getBalance() {
  try {
    const address = document.getElementById("sender").value;

    if (!address) {
      alert("Vendos adresën!");
      return;
    }

    // Provider publik (BSC)
    provider = new window.ethers.providers.JsonRpcProvider(
      "https://bsc-dataseed.binance.org/"
    );

    const balance = await provider.getBalance(address);
    const formatted = window.ethers.utils.formatEther(balance);

    document.getElementById("balance").innerText =
      parseFloat(formatted).toFixed(4) + " BNB";

  } catch (err) {
    alert("Error: " + err.message);
  }
}

// ✅ Connect për dërgim
async function connectWallet() {
  if (!window.ethereum) {
    alert("Install MetaMask / Trust Wallet");
    return;
  }

  provider = new window.ethers.providers.Web3Provider(window.ethereum);
  await window.ethereum.request({ method: "eth_requestAccounts" });
  signer = provider.getSigner();

  alert("Wallet connected!");
}

// ✅ Dërgim tokenash
async function sendToken() {
  try {
    if (!signer) {
      alert("Connect wallet first!");
      return;
    }

    const tokenAddress = document.getElementById("tokenAddress").value;
    const to = document.getElementById("to").value;
    const amount = document.getElementById("amount").value;

    const token = new window.ethers.Contract(tokenAddress, ERC20_ABI, signer);

    const decimals = await token.decimals();
    const amountParsed = window.ethers.utils.parseUnits(amount, decimals);

    const tx = await token.transfer(to, amountParsed);
    await tx.wait();

    alert("Token sent!");
  } catch (err) {
    alert("Error: " + err.message);
  }
}
</script>

</body>
</html>
