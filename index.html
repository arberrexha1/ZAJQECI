<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BNB Token Sender</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .secondary {
      background: #10b981;
    }

    .secondary:hover {
      background: #059669;
    }

    .account {
      font-size: 12px;
      margin-top: 10px;
      word-break: break-all;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>🚀 Send Your Token</h2>

    <button onclick="connectWallet()">Connect Wallet</button>
    <p id="account" class="account"></p>

    <input type="text" id="to" placeholder="Recipient Address">
    <input type="number" id="amount" placeholder="Amount">

    <button class="secondary" onclick="sendToken()">Send Tokens</button>
  </div>

    async function connectWallet() {
      if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        const accounts = await web3.eth.getAccounts();
        account = accounts[0];
        document.getElementById("account").innerText = "Connected: " + account;
      } else {
        alert("Install MetaMask!");
      }
    }

    async function sendToken() {
      const to = document.getElementById("to").value;
      const amount = document.getElementById("amount").value;

      const contract = new web3.eth.Contract(tokenABI, tokenAddress);

      const decimals = 18;
      const value = web3.utils.toBN(amount * (10 ** decimals));

      try {
        await contract.methods.transfer(to, value).send({ from: account });
        alert("✅ Transaction sent!");
      } catch (err) {
        console.error(err);
        alert("❌ Error sending token");
      }
    }
  </script>

</body>
</html>
