<!DOCTYPE html>
<html>
<head>
  <title>Send ERC20 Token</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
</head>
<body>

<h2>Send Token</h2>


<button onclick="connectWallet()">Connect Wallet</button><br><br>

<!-- Adresa e dërguesit -->
<input id="sender" placeholder="Sender Address" readonly><br><br>

<input id="tokenAddress" placeholder="Token Contract Address"><br><br>
<input id="to" placeholder="Recipient Address"><br><br>
<input id="amount" placeholder="Amount"><br><br>

<button onclick="sendToken()">Send Token</button>

<script>
let provider;
let signer;

// ERC20 ABI minimale (vetëm transfer)
const ERC20_ABI = [
  "function transfer(address to, uint amount) returns (bool)",
  "function decimals() view returns (uint8)"
];

async function connectWallet() {
  if (window.ethereum) {
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    alert("Wallet connected!");
  } else {
    alert("Install MetaMask or Trust Wallet browser!");
  }
}

async function sendToken() {
  try {
    const tokenAddress = document.getElementById("tokenAddress").value;
    const to = document.getElementById("to").value;
    const amount = document.getElementById("amount").value;

    const token = new ethers.Contract(tokenAddress, ERC20_ABI, signer);

    const decimals = await token.decimals();
    const amountParsed = ethers.utils.parseUnits(amount, decimals);

    const tx = await token.transfer(to, amountParsed);
    await tx.wait();

    alert("Token sent!");
  } catch (err) {
    console.error(err);
    alert("Error: " + err.message);
  }
}
</script>

</body>
</html>
