<!DOCTYPE html>
<html>
<head>
  <title>Wallet Sender</title>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #334155;
      color: white;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
      word-break: break-all;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Send Token</h2>

  <button onclick="connectWallet()">Connect Wallet</button>

  <div class="info">
    <p><strong>Address:</strong> <span id="address">Not connected</span></p>
    <p><strong>BNB Balance:</strong> <span id="balance">0</span></p>
  </div>

  <input id="tokenAddress" placeholder="Token Contract Address">
  <input id="to" placeholder="Recipient Address">
  <input id="amount" placeholder="Amount">

  <button onclick="sendToken()">Send Token</button>
</div>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>

<body>

<button onclick="connectWallet()">Connect Wallet</button>

<p id="status">Status: Not connected</p>
<p>Address: <span id="address"></span></p>


<script>
let provider;
let signer;

const ERC20_ABI = [
  "function transfer(address to, uint amount) returns (bool)",
  "function decimals() view returns (uint8)"
];
async function connectWallet() {
  try {
    if (!window.ethereum) {
      alert("❌ Nuk u gjet wallet! Instalo MetaMask ose përdor Trust Wallet browser");
      return;
    }

    document.getElementById("status").innerText = "Connecting...";

    const provider = new window.ethers.providers.Web3Provider(window.ethereum);

    // Kërko akses
    await window.ethereum.request({ method: "eth_requestAccounts" });

    const signer = provider.getSigner();
    const address = await signer.getAddress();

    document.getElementById("address").innerText = address;
    document.getElementById("status").innerText = "✅ Connected";

  } catch (err) {
    console.error(err);
    alert("Error: " + err.message);
  }
}

async function sendToken() {
  try {
    const tokenAddress = document.getElementById("tokenAddress").value;
    const to = document.getElementById("to").value;
    const amount = document.getElementById("amount").value;

    const token = new ethers.Contract(tokenAddress, ERC20_ABI, signer);

    const decimals = await token.decimals();
    const amountParsed = ethers.utils.parseUnits(amount, decimals);

    const tx = await token.transfer(to, amountParsed);
    await tx.wait();

    alert("Token sent!");
  } catch (err) {
    alert("Error: " + err.message);
  }
}
</script>

</body>
</html>
